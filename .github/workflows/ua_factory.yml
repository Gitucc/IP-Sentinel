name: Automated UA Factory

on:
  schedule:
    - cron: '0 4 1 * *'
  workflow_dispatch: 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Run UA Factory Generator
      run: python scripts/ua_generator.py

    - name: Commit and Push All Data
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        git add data/user_agents.txt
        
        if git diff --staged --quiet; then
          echo "No changes, skipping."
          exit 0
        fi
        
        git commit -m "chore(data): auto-update User-Agents database [$(date +'%Y-%m-%d')]"
        git push origin main