name: Daily Data Factory

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Execute Trends Engine
        run: python scripts/fetch_trends.py

      - name: Execute Trust URL Engine
        run: python scripts/fetch_trust_urls.py

      - name: Commit and Push All Data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add data/keywords/
          git add data/regions/
          
          if git diff --staged --quiet; then
            echo "No changes, skipping."
            exit 0
          fi
          
          git commit -m "chore(data): auto-update keywords and news streams [$(date +'%Y-%m-%d')]"
          git push origin main
